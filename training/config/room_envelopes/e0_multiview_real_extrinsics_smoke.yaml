defaults:
  - 0_default_dataset_room_envelopes.yaml

# Phase F smoke config, multi-view Room Envelopes with real recovered
# extrinsics. Not for training. The intent is purely to prove the loader
# returns:
#   - tuples of size fix_img_num=3
#   - all from the same (scene, cam) sequence
#   - with non-identity OpenCV w2c 3×4 extrinsics
# and that the 58 manifest-invalid samples are filtered out of the index.

exp_name: e0_multiview_real_extrinsics_smoke

img_size: 224
patch_size: 14
num_workers: 0
seed_value: 42

data:
  train:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: 4
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      max_img_per_gpu: 4
      fix_img_num: 3
      img_nums: [3, 3]

    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.room_envelopes.RoomEnvelopesDataset
          split: train
          DATA_DIR: ${oc.env:ROOMENV_DATA_WDS_DIR,${oc.env:ROOMENV_DATA_DIR,/path/to/datasets/room_envelopes}/data_wds_extracted}
          len_train: 100
          min_frames: 3
          load_mask: false
          load_normal: false
          use_sequence_cache: true
          use_real_extrinsics: true
          extrinsics_manifest: ../evaluations/room_envelopes/extrinsics_manifest.npz
          require_extrinsics: true
          fallback_identity_extrinsics: false
          exclude_invalid_extrinsics: true

  val:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: 4
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: 3
      img_nums: [3, 3]

    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.room_envelopes.RoomEnvelopesDataset
          split: val
          DATA_DIR: ${oc.env:ROOMENV_DATA_WDS_DIR,${oc.env:ROOMENV_DATA_DIR,/path/to/datasets/room_envelopes}/data_wds_extracted}
          len_val: 50
          min_frames: 3
          load_mask: true
          load_normal: false
          mask_source: seen_mask
          use_sequence_cache: true
          use_real_extrinsics: true
          extrinsics_manifest: ../evaluations/room_envelopes/extrinsics_manifest.npz
          require_extrinsics: true
          fallback_identity_extrinsics: false
          exclude_invalid_extrinsics: true

  test:
    _target_: data.dynamic_dataloader.DynamicTorchDataset
    num_workers: ${num_workers}
    max_img_per_gpu: 4
    common_config:
      img_size: ${img_size}
      patch_size: ${patch_size}
      fix_img_num: 3
      img_nums: [3, 3]

    dataset:
      _target_: data.composed_dataset.ComposedDataset
      dataset_configs:
        - _target_: data.datasets.room_envelopes.RoomEnvelopesDataset
          split: test
          DATA_DIR: ${oc.env:ROOMENV_DATA_WDS_DIR,${oc.env:ROOMENV_DATA_DIR,/path/to/datasets/room_envelopes}/data_wds_extracted}
          len_test: 50
          min_frames: 3
          load_mask: true
          load_normal: false
          mask_source: seen_mask
          use_sequence_cache: true
          use_real_extrinsics: true
          extrinsics_manifest: ../evaluations/room_envelopes/extrinsics_manifest.npz
          require_extrinsics: true
          fallback_identity_extrinsics: false
          exclude_invalid_extrinsics: true


logging:
  log_dir: logs/${exp_name}
  use_wandb: false
  log_level_primary: INFO
  log_level_secondary: WARNING

model:
  _target_: vggt.models.vggt.VGGT
  enable_camera: True
  enable_depth: True
  enable_point: False
  enable_track: False
  enable_layout_depth: False
  enable_layout_mask: False
  enable_layout_normal: False
  enable_seg: False
